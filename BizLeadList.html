function tlabel(t){return({'1A':'T-1A','1B':'T-1B','2':'T-2','3':'T-3','4':'T-4'})[t]||t;}
function isWorked(s){return['called','no-answer','contacted','appt-set','not-interested','follow-up'].includes(s);}
const PHONE_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>';
const SKEYS=['called','no-answer','contacted','appt-set','not-interested','follow-up'];
const SLABELS={called:'Called','no-answer':'No Answer',contacted:'Contacted','appt-set':'Appt Set','not-interested':'Not Interested','follow-up':'Follow Up'};
const SCRIPTS={
  '1A':"Hi, I'm Trey with BTG Financial Group. We work with business owners who just opened in the area. Noticed you recently got started and wanted to stop in, introduce myself, and see if protecting the business is something on your radar. Do you have 5 minutes?",
  '1B':"Hi, is this the owner? This is Trey Hill with BTG Financial Group. I work with new business owners in your area. I noticed you recently opened up and I specialize in protecting businesses early. Keyperson coverage, business overhead. Not selling anything today, just want to learn about what you are building. Do you have 15 minutes this week?",
  'def':"Hi, is this the owner? This is Trey Hill with BTG Financial Group. I work with new business owners across Texas. I noticed you recently registered and I specialize in protecting business owners early. Not here to pitch, just want a quick 15-minute conversation to learn about your business. Would that work this week?"
};
let tracking={},activeTab='all',searchQ='',sortBy='tier',countyF='',expandedId=null;
function loadTk(){try{const s=localStorage.getItem('btg_bll4');if(s)tracking=JSON.parse(s);}catch(e){}}
function saveTk(){try{localStorage.setItem('btg_bll4',JSON.stringify(tracking));}catch(e){}updateStats();}
function getTk(id){return tracking[id]||{status:'fresh',notes:'',ts:0};}
function toggleCard(id){expandedId=(expandedId===id)?null:id;render();}
function logCall(id){const tk=getTk(id);tracking[id]={...tk,status:tk.status==='fresh'?'called':tk.status,ts:Date.now()};saveTk();}
function setStatus(id,status){tracking[id]={...getTk(id),status};saveTk();render();}
function saveNotes(id){const el=document.getElementById('n'+id);if(!el)return;tracking[id]={...getTk(id),notes:el.value};saveTk();const m=document.getElementById('sm'+id);if(m){m.textContent='Saved!';setTimeout(()=>{m.textContent='';},2000);}}
function copyNum(id){
  const r=DATA.find(x=>x.i===id);if(!r)return;
  const btn=event.currentTarget;
  function flash(){btn.textContent='Copied!';btn.style.background='#16a34a';btn.style.color='#fff';setTimeout(()=>{btn.textContent='Copy';btn.style.background='';btn.style.color='';},1500);}
  function fb(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  if(navigator.clipboard){navigator.clipboard.writeText(r.p).then(flash).catch(()=>{fb(r.p);flash();});}else{fb(r.p);flash();}
}
function getList(){
  let list=DATA.map(r=>({...r,_tk:getTk(r.i)}));
  if(activeTab==='worked')list=list.filter(r=>isWorked(r._tk.status));
  else if(activeTab!=='all')list=list.filter(r=>r.t===activeTab);
  if(countyF)list=list.filter(r=>r.co===countyF);
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(r=>r.n.toLowerCase().includes(q)||r.c.toLowerCase().includes(q)||r.ind.toLowerCase().includes(q)||r.a.toLowerCase().includes(q));}
  const to={'1A':1,'1B':2,'2':3,'3':4,'4':5};
  const so={'appt-set':1,contacted:2,'follow-up':3,called:4,'no-answer':5,'not-interested':6,fresh:7};
  if(sortBy==='tier')list.sort((a,b)=>(to[a.t]||9)-(to[b.t]||9));
  else if(sortBy==='city')list.sort((a,b)=>a.c.localeCompare(b.c));
  else if(sortBy==='industry')list.sort((a,b)=>a.ind.localeCompare(b.ind));
  else if(sortBy==='status')list.sort((a,b)=>(so[a._tk.status]||9)-(so[b._tk.status]||9));
  return list;
}
function makeCard(r){
  const tk=r._tk;const isExp=r.i===expandedId;const wk=isWorked(tk.status);
  const card=document.createElement('div');
  card.className='card'+(isExp?' expanded':'')+(wk?' worked':'');
  card.id='card-'+r.i;
  const top=document.createElement('div');top.className='card-top';
  top.addEventListener('click',()=>toggleCard(r.i));
  const left=document.createElement('div');left.className='card-left';
  left.innerHTML='<div class="biz-name">'+esc(r.n)+'</div><div class="biz-city">'+esc(r.c)+', TX &bull; '+esc(r.co)+' Co.</div><div class="biz-industry">'+esc(r.ind)+'</div>';
  const right=document.createElement('div');right.className='card-right';
  const phoneNum=document.createElement('span');phoneNum.className='phone-num';phoneNum.textContent=r.p;
  const btnRow=document.createElement('div');btnRow.className='btn-row';
  const copyBtn=document.createElement('button');copyBtn.className='copy-btn';copyBtn.textContent='Copy';
  copyBtn.addEventListener('click',e=>{e.stopPropagation();copyNum(r.i);});
  const callA=document.createElement('a');callA.className='call-btn-sm';callA.href=pHref(r.p);
  callA.innerHTML=PHONE_SVG+'Call';callA.addEventListener('click',e=>{e.stopPropagation();logCall(r.i);});
  btnRow.appendChild(copyBtn);btnRow.appendChild(callA);
  const badge=document.createElement('span');badge.className='tbadge tb-'+r.t;badge.textContent=tlabel(r.t);
  const dot=document.createElement('span');dot.className='sdot s-'+tk.status;dot.title=tk.status;
  right.appendChild(phoneNum);right.appendChild(btnRow);right.appendChild(badge);right.appendChild(dot);
  top.appendChild(left);top.appendChild(right);
  const detail=document.createElement('div');detail.className='card-detail';
  const addr=document.createElement('div');addr.className='detail-addr';addr.textContent='📍 '+r.a+', '+r.c+', TX '+r.z;
  const links=document.createElement('div');links.className='action-links';
  const mapA=document.createElement('a');mapA.className='alink';mapA.href=mUrl(r);mapA.target='_blank';mapA.textContent='🗺 Map';
  links.appendChild(mapA);
  if(r.p2){const bkA=document.createElement('a');bkA.className='alink';bkA.href=pHref(r.p2);bkA.textContent='📲 Backup: '+r.p2;bkA.addEventListener('click',()=>logCall(r.i));links.appendChild(bkA);}
  const convo=document.createElement('div');convo.className='convo-pill';convo.textContent='💡 '+r.cv;
  const statusRow=document.createElement('div');statusRow.className='status-row';
  SKEYS.forEach(s=>{const btn=document.createElement('button');btn.className='sbtn sb-'+s+(tk.status===s?' on':'');btn.textContent=SLABELS[s];btn.addEventListener('click',()=>setStatus(r.i,s));statusRow.appendChild(btn);});
  const ta=document.createElement('textarea');ta.className='notes-box';ta.id='n'+r.i;ta.placeholder='Notes from this call...';ta.value=tk.notes||'';
  const saveBtn=document.createElement('button');saveBtn.className='save-note-btn';saveBtn.textContent='Save Notes';saveBtn.addEventListener('click',()=>saveNotes(r.i));
  const savedMsg=document.createElement('span');savedMsg.className='saved-msg';savedMsg.id='sm'+r.i;
  const scriptBlock=document.createElement('div');scriptBlock.className='script-block';
  const sLbl=document.createElement('div');sLbl.className='script-lbl';sLbl.textContent=r.t==='1A'?'Walk-In Opener':'Phone Opener';
  const sTxt=document.createElement('div');sTxt.className='script-txt';sTxt.textContent='\u201c'+(SCRIPTS[r.t]||SCRIPTS['def'])+'\u201d';
  scriptBlock.appendChild(sLbl);scriptBlock.appendChild(sTxt);
  if(tk.ts){const lc=document.createElement('div');lc.style.cssText='font-size:11px;color:#9ca3af;margin-bottom:8px;';lc.textContent='Last called: '+fmtDate(tk.ts);detail.appendChild(addr);detail.appendChild(links);detail.appendChild(convo);detail.appendChild(lc);}
  else{detail.appendChild(addr);detail.appendChild(links);detail.appendChild(convo);}
  detail.appendChild(statusRow);detail.appendChild(ta);detail.appendChild(saveBtn);detail.appendChild(savedMsg);detail.appendChild(scriptBlock);
  card.appendChild(top);card.appendChild(detail);
  return card;
}
function render(){
  const list=getList();const el=document.getElementById('leadList');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="no-results">No leads match your filters.</div>';return;}
  const frag=document.createDocumentFragment();list.forEach(r=>frag.appendChild(makeCard(r)));el.appendChild(frag);
}
function updateStats(){
  const wk=DATA.filter(r=>isWorked(getTk(r.i).status)).length;
  const ap=DATA.filter(r=>getTk(r.i).status==='appt-set').length;
  const lf=DATA.filter(r=>getTk(r.i).status==='fresh').length;
  document.getElementById('hs-total').textContent=DATA.length;
  document.getElementById('hs-worked').textContent=wk;
  document.getElementById('hs-appt').textContent=ap;
  document.getElementById('hs-left').textContent=lf;
  document.getElementById('tc-all').textContent='('+DATA.length+')';
  ['1A','1B','2','3','4'].forEach(t=>{document.getElementById('tc-'+t).textContent='('+DATA.filter(r=>r.t===t).length+')';});
  document.getElementById('tc-worked').textContent='('+wk+')';
}
function doExport(){
  const list=getList();
  const hdr=['Business','City','County','Address','ZIP','Industry','Conversation','Phone','Backup','Tier','Status','Notes','Last Called'];
  const rows=list.map(r=>{const tk=r._tk;return[r.n,r.c,r.co,r.a,r.z,r.ind,r.cv,r.p,r.p2||'',r.t,tk.status,tk.notes||'',tk.ts?fmtDate(tk.ts):''];});
  const csv=[hdr,...rows].map(row=>row.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='BTG_Leads.csv';a.click();
}
loadTk();
const counties=[...new Set(DATA.map(r=>r.co).filter(Boolean))].sort();
const csel=document.getElementById('countySel');
counties.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+' County';csel.appendChild(o);});
updateStats();render();
document.getElementById('srch').addEventListener('input',e=>{searchQ=e.target.value;render();});
document.getElementById('sortSel').addEventListener('change',e=>{sortBy=e.target.value;render();});
document.getElementById('countySel').addEventListener('change',e=>{countyF=e.target.value;render();});
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));tab.classList.add('on');activeTab=tab.dataset.t;render();});});
</script>
</body>
</html>
